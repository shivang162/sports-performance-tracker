<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Sports Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red: #E83A2F;
            --red-dark: #B52D24;
            --black: #0A0A0A;
            --dark: #111111;
            --card: #161616;
            --border: #2a2a2a;
            --text: #F0EDE8;
            --muted: #666;
            --accent: #F5C518;
            --green: #4ade80;
        }

        body { font-family: 'DM Sans', sans-serif; background: var(--black); color: var(--text); min-height: 100vh; }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 40px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav-logo { display: flex; align-items: center; gap: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; }

        .nav-logo span { width: 32px; height: 32px; background: var(--red); border-radius: 8px; display: grid; place-items: center; font-size: 16px; }

        .nav-right { display: flex; align-items: center; gap: 16px; }

        .badge { font-size: 12px; color: var(--muted); background: var(--card); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; }

        .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 16px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
        .btn-logout:hover { border-color: var(--red); color: var(--red); }

        main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

        .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 2px; margin-bottom: 6px; }
        .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 36px; }

        /* ── 5 stat cards — now includes Trend from DB ── */
        .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }

        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }

        .stat-card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }

        .stat-card-value { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 1px; }

        .stat-card-value.yellow { color: var(--accent); }
        .stat-card-value.green  { color: var(--green); }
        .stat-card-value.red    { color: var(--red); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 28px; }

        .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; margin-bottom: 20px; color: var(--text); }

        .field { margin-bottom: 14px; }

        .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }

        .field input { width: 100%; background: #1e1e1e; border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }

        .field input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(232,58,47,0.1); }

        .field input::placeholder { color: #3a3a3a; }

        .btn-save { width: 100%; margin-top: 6px; background: var(--red); color: white; border: none; border-radius: 8px; padding: 13px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
        .btn-save:hover  { background: var(--red-dark); }
        .btn-save:active { transform: scale(0.98); }

        .level-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; margin-top: 12px; }
        .level-Excellent { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
        .level-Good      { background: rgba(245,197,24,0.15);  color: var(--accent); border: 1px solid rgba(245,197,24,0.3); }
        .level-Average   { background: rgba(232,58,47,0.15);   color: #fca5a5;       border: 1px solid rgba(232,58,47,0.3); }
        .level-Needs     { background: rgba(150,150,150,0.1);  color: var(--muted);  border: 1px solid var(--border); }

        .card.full { grid-column: 1 / -1; }

        table { width: 100%; border-collapse: collapse; }

        thead th { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }

        tbody td { padding: 12px 12px; font-size: 14px; border-bottom: 1px solid #1e1e1e; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }

        .del-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: border-color 0.2s, color 0.2s; }
        .del-btn:hover { border-color: var(--red); color: var(--red); }

        .empty-row td { text-align: center; color: var(--muted); padding: 32px; font-size: 13px; }

        /* Toast uses position:absolute workaround since fixed collapses iframe */
        .toast-wrap { position: relative; }
        .toast { position: fixed; bottom: 28px; right: 28px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; font-size: 13px; color: var(--text); transform: translateY(80px); opacity: 0; transition: all 0.3s ease; z-index: 999; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.green { border-color: rgba(74,222,128,0.4); color: var(--green); }
        .toast.red   { border-color: rgba(232,58,47,0.4);  color: #f87171; }

        @media (max-width: 700px) {
            .grid { grid-template-columns: 1fr; }
            nav { padding: 14px 20px; }
            main { padding: 24px 16px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo"><span>🏃</span> APEX SPORTS</div>
    <div class="nav-right">
        <span class="badge" id="userBadge">Guest</span>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<main>
    <div class="page-title">PERFORMANCE DASHBOARD</div>
    <p class="page-sub">Track your sessions and monitor progress in real time.</p>

    <!--
        5 stat cards.
        totalSessions, avgScore, stat-trend — populated by fetchDashboard() from GET /dashboard (Java DB)
        avgSpeed, bestSpeed               — populated by updateUI() from localStorage records
    -->
    <div class="stat-cards">
        <div class="stat-card">
            <div class="stat-card-label">Sessions (DB)</div>
            <div class="stat-card-value yellow" id="totalSessions">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-label">Avg Score (DB)</div>
            <div class="stat-card-value yellow" id="avgScore">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-label">Trend (DB)</div>
            <!-- id="stat-trend" is read by fetchDashboard() in script.js -->
            <div class="stat-card-value yellow" id="stat-trend">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-label">Avg Speed</div>
            <div class="stat-card-value green" id="avgSpeed">0.00</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-label">Best Speed</div>
            <div class="stat-card-value red" id="bestSpeed">0.00</div>
        </div>
    </div>

    <div class="grid">

        <!-- Input form — saveData() in script.js posts to POST /save -->
        <div class="card">
            <div class="card-title">ADD PERFORMANCE</div>

            <div class="field">
                <label>Distance (m)</label>
                <input type="number" id="distance" placeholder="e.g. 400" min="0">
            </div>
            <div class="field">
                <label>Time (sec)</label>
                <input type="number" id="time" placeholder="e.g. 60" min="0">
            </div>
            <div class="field">
                <label>Accuracy (0–100)</label>
                <input type="number" id="accuracy" placeholder="e.g. 85" min="0" max="100">
            </div>
            <div class="field">
                <label>Stamina (0–100)</label>
                <input type="number" id="stamina" placeholder="e.g. 70" min="0" max="100">
            </div>

            <button class="btn-save" onclick="saveData()">SAVE SESSION</button>

            <!-- showLevelBadge() in script.js writes here after save -->
            <div id="levelBadge"></div>
        </div>

        <!-- Chart — drawChart() in script.js renders here -->
        <div class="card">
            <div class="card-title">SPEED OVER TIME</div>
            <canvas id="chart"></canvas>
        </div>

        <!-- Table — updateUI() in script.js renders rows here -->
        <div class="card full">
            <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
                RECORDS
                <button class="btn-logout" onclick="resetData()" style="font-size:12px;">Reset All</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Distance</th>
                        <th>Time</th>
                        <th>Speed</th>
                        <th>Accuracy</th>
                        <th>Stamina</th>
                        <th>Score</th>
                        <th>Level</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

    </div>
</main>

<div class="toast" id="toast"></div>

<!-- Single shared script — all logic lives here -->
<script src="js/script.js"></script>

</body>
</html>
